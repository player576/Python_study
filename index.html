<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #e0f7fa; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; background: #26c6da; color: white; }
        button:hover { background: #00acc1; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="q">Загрузка...</h2>
    <div id="btns"></div>
</div>

<script>
    const questions = [
        { q: "Как вывести что-то на экран в Python?", options: ["print()", "show()", "console.log()"], a: "print()" },
        { q: "Что такое 'hello' в Python?", options: ["Число", "Строка (текст)", "Функция"], a: "Строка (текст)" },
        { q: "Как создать переменную?", options: ["x = 10", "var x = 10", "let x = 10"], a: "x = 10" },
        { q: "Какой символ начинает комментарий?", options: ["//", "#", "/*"], a: "#" }
    ];

    let i = 0;
    function show() {
        if(i >= questions.length) { document.querySelector(".box").innerHTML = "<h1>Курс пройден! Молодец! 🎉</h1>"; return; }
        document.getElementById("q").innerText = questions[i].q;
        let b = document.getElementById("btns"); b.innerHTML = "";
        questions[i].options.forEach(opt => {
            let btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === questions[i].a) { i++; show(); } 
                else { alert("Неверно, попробуй еще раз!"); }
            };
            b.appendChild(btn);
        });
    }
    show();
</script>
</body>
</html>
