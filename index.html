<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Trainer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #progress-bar { width: 100%; height: 10px; background: #444; border-radius: 5px; margin-bottom: 20px; }
        #progress { height: 100%; background: #4CAF50; width: 0%; border-radius: 5px; transition: 0.3s; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; background: #444; color: white; font-size: 16px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

<div class="card">
    <div id="progress-bar"><div id="progress"></div></div>
    <h2 id="question">Загрузка...</h2>
    <div id="options"></div>
</div>

<script>
    const quiz = [
        { q: "Как вывести текст в консоль?", opt: ["print()", "input()", "echo()"], a: "print()" },
        { q: "Как создать переменную x со значением 5?", opt: ["var x = 5", "x = 5", "int x = 5"], a: "x = 5" },
        { q: "Какой символ используется для комментариев?", opt: ["//", "/*", "#"], a: "#" }
    ];

    let current = 0;
    const progress = document.getElementById("progress");

    function loadQuestion() {
        document.getElementById("question").innerText = quiz[current].q;
        const optDiv = document.getElementById("options");
        optDiv.innerHTML = "";
        
        quiz[current].opt.forEach(o => {
            let btn = document.createElement("button");
            btn.innerText = o;
            btn.onclick = () => check(o);
            optDiv.appendChild(btn);
        });

        progress.style.width = (current / quiz.length) * 100 + "%";
    }

    function check(ans) {
        if(ans === quiz[current].a) {
            current++;
            if(current < quiz.length) {
                loadQuestion();
            } else {
                document.querySelector(".card").innerHTML = "<h1>Курс пройден! 🎉</h1>";
            }
        } else {
            alert("Неверно, попробуй еще раз!");
        }
    }
    loadQuestion();
</script>
</body>
</html>
